<svg viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0b1220"/>
      <stop offset="0.6" stop-color="#0d1a2e"/>
      <stop offset="1"   stop-color="#0a1424"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.85" r="0.7">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bae6fd"/><stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="topAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/><stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <clipPath id="ground"><rect x="0" y="0" width="1200" height="268"/></clipPath>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <g stroke="#38bdf8" stroke-opacity="0.09" stroke-width="1">
    <line x1="0" y1="70" x2="1200" y2="70"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="90" y1="0" x2="90" y2="360"/><line x1="230" y1="0" x2="230" y2="360"/>
    <line x1="370" y1="0" x2="370" y2="360"/><line x1="510" y1="0" x2="510" y2="360"/>
    <line x1="650" y1="0" x2="650" y2="360"/><line x1="790" y1="0" x2="790" y2="360"/>
    <line x1="930" y1="0" x2="930" y2="360"/><line x1="1070" y1="0" x2="1070" y2="360"/>
  </g>

  <g clip-path="url(#ground)">
    <g transform="translate(140,268)"><g>
      <animateTransform attributeName="transform" type="translate" values="0 260;0 0"
        calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.0s" dur="1.0s" fill="freeze"/>
      <polygon points="0,-96 34,-79 0,-62 -34,-79" fill="url(#topFace)"/>
      <polygon points="-34,-79 0,-62 0,0 -34,-62" fill="#0ea5e9"/>
      <polygon points="34,-79 0,-62 0,0 34,-62" fill="#075985"/>
    </g></g>

    <g transform="translate(212,268)"><g>
      <animateTransform attributeName="transform" type="translate" values="0 260;0 0"
        calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.14s" dur="1.0s" fill="freeze"/>
      <polygon points="0,-186 44,-164 0,-142 -44,-164" fill="url(#topFace)"/>
      <polygon points="-44,-164 0,-142 0,0 -44,-142" fill="#0ea5e9"/>
      <polygon points="44,-164 0,-142 0,0 44,-142" fill="#075985"/>
      <circle cx="18" cy="-60" r="3" fill="#7dd3fc"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
      <circle cx="27" cy="-108" r="3" fill="#7dd3fc"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.9s" repeatCount="indefinite"/></circle>
    </g></g>

    <g transform="translate(292,268)"><g>
      <animateTransform attributeName="transform" type="translate" values="0 260;0 0"
        calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.28s" dur="1.0s" fill="freeze"/>
      <polygon points="0,-128 36,-110 0,-92 -36,-110" fill="url(#topFace)"/>
      <polygon points="-36,-110 0,-92 0,0 -36,-92" fill="#0ea5e9"/>
      <polygon points="36,-110 0,-92 0,0 36,-92" fill="#075985"/>
    </g></g>

    <g transform="translate(372,268)"><g>
      <animateTransform attributeName="transform" type="translate" values="0 260;0 0"
        calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.46s" dur="1.05s" fill="freeze"/>
      <polygon points="0,-224 48,-200 0,-176 -48,-200" fill="url(#topAmber)"/>
      <polygon points="-48,-200 0,-176 0,0 -48,-176" fill="#f59e0b"/>
      <polygon points="48,-200 0,-176 0,0 48,-176" fill="#b45309"/>
      <circle cx="22" cy="-70"  r="3.2" fill="#fde68a"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" begin="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="31" cy="-126" r="3.2" fill="#fde68a"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" begin="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="22" cy="-176" r="3.2" fill="#fde68a"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" begin="2.0s" repeatCount="indefinite"/></circle>
    </g></g>

    <g transform="translate(452,268)"><g>
      <animateTransform attributeName="transform" type="translate" values="0 260;0 0"
        calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.4s" dur="1.0s" fill="freeze"/>
      <polygon points="0,-156 40,-136 0,-116 -40,-136" fill="url(#topFace)"/>
      <polygon points="-40,-136 0,-116 0,0 -40,-116" fill="#0ea5e9"/>
      <polygon points="40,-136 0,-116 0,0 40,-116" fill="#075985"/>
    </g></g>

    <g transform="translate(522,268)"><g>
      <animateTransform attributeName="transform" type="translate" values="0 260;0 0"
        calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.58s" dur="1.0s" fill="freeze"/>
      <polygon points="0,-84 30,-69 0,-54 -30,-69" fill="url(#topFace)"/>
      <polygon points="-30,-69 0,-54 0,0 -30,-54" fill="#0ea5e9"/>
      <polygon points="30,-69 0,-54 0,0 30,-54" fill="#075985"/>
    </g></g>
  </g>

  <line x1="86" y1="268" x2="580" y2="268" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1.5"
        stroke-dasharray="494" stroke-dashoffset="494">
    <animate attributeName="stroke-dashoffset" from="494" to="0" begin="0.1s" dur="1.1s" fill="freeze"/>
  </line>

  <g font-size="10.5" fill="#64809c" letter-spacing="1.2" text-anchor="middle">
    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.15s" dur="0.6s" fill="freeze"/>
      <circle cx="105" cy="268" r="3.5" fill="#0ea5e9"><animate attributeName="fill" values="#0ea5e9;#fbbf24;#0ea5e9" keyTimes="0;0.08;0.2" dur="5s" begin="1.6s" repeatCount="indefinite"/></circle>
      <text x="105" y="288">LAND</text>
      <circle cx="222" cy="268" r="3.5" fill="#0ea5e9"><animate attributeName="fill" values="#0ea5e9;#fbbf24;#0ea5e9" keyTimes="0;0.28;0.4" dur="5s" begin="1.6s" repeatCount="indefinite"/></circle>
      <text x="222" y="288">DESIGN</text>
      <circle cx="339" cy="268" r="3.5" fill="#0ea5e9"><animate attributeName="fill" values="#0ea5e9;#fbbf24;#0ea5e9" keyTimes="0;0.48;0.6" dur="5s" begin="1.6s" repeatCount="indefinite"/></circle>
      <text x="339" y="288">BUILD</text>
      <circle cx="456" cy="268" r="3.5" fill="#0ea5e9"><animate attributeName="fill" values="#0ea5e9;#fbbf24;#0ea5e9" keyTimes="0;0.68;0.8" dur="5s" begin="1.6s" repeatCount="indefinite"/></circle>
      <text x="456" y="288">HANDOVER</text>
      <circle cx="566" cy="268" r="3.5" fill="#0ea5e9"><animate attributeName="fill" values="#0ea5e9;#fbbf24;#0ea5e9" keyTimes="0;0.88;1" dur="5s" begin="1.6s" repeatCount="indefinite"/></circle>
      <text x="566" y="288">OPERATE</text>
    </g>
  </g>

  <g transform="translate(636,0)">
    <text x="0" y="118" fill="#eaf3ff" font-size="54" font-weight="700" letter-spacing="0.5" opacity="0">
      Matthew Emma
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.7s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="16 0;0 0"
        calcMode="spline" keySplines="0.2 0.8 0.2 1" begin="0.7s" dur="0.7s" fill="freeze"/>
    </text>

    <text x="2" y="152" fill="#7dd3fc" font-size="19" font-weight="600" opacity="0">
      Construction operator turned commercial closer.
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.7s" fill="freeze"/>
    </text>
    <text x="2" y="178" fill="#8ea6bd" font-size="16" opacity="0">
      One mind, the whole arc — land to operations.
      <animate attributeName="opacity" from="0" to="1" begin="1.15s" dur="0.7s" fill="freeze"/>
    </text>

    <line x1="2" y1="200" x2="56" y2="200" stroke="#f59e0b" stroke-width="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.5s" fill="freeze"/>
    </line>

    <g opacity="0"><animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.7s" fill="freeze"/>
      <rect x="2"   y="222" width="120" height="34" rx="6" fill="#0ea5e9" fill-opacity="0.12" stroke="#0ea5e9" stroke-opacity="0.55"/>
      <rect x="2"   y="222" width="3.5" height="34" rx="1.5" fill="#0ea5e9"/>
      <text x="18"  y="244" fill="#bae6fd" font-size="15" font-weight="600">Massing</text>

      <rect x="134" y="222" width="176" height="34" rx="6" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-opacity="0.55"/>
      <rect x="134" y="222" width="3.5" height="34" rx="1.5" fill="#f59e0b"/>
      <text x="150" y="244" fill="#fde68a" font-size="15" font-weight="600">Master Builder</text>

      <rect x="322" y="222" width="112" height="34" rx="6" fill="#FF6A2B" fill-opacity="0.12" stroke="#FF6A2B" stroke-opacity="0.55"/>
      <rect x="322" y="222" width="3.5" height="34" rx="1.5" fill="#FF6A2B"/>
      <text x="338" y="244" fill="#ffb894" font-size="15" font-weight="600">Osprey</text>
    </g>

    <text x="2" y="292" fill="#64809c" font-size="14" letter-spacing="0.2" opacity="0">
      github.com/ibuilder · linkedin.com/in/memma · mattemma.blog
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.7s" fill="freeze"/>
    </text>
  </g>
</svg>
