<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#0b1220"/>
      <stop offset="0.6" stop-color="#0d1a2e"/>
      <stop offset="1"   stop-color="#0a1424"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.34" cy="0.9" r="0.7">
      <stop offset="0"   stop-color="#0ea5e9" stop-opacity="0.28"/>
      <stop offset="1"   stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bae6fd"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="topAmber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <clipPath id="groundClip"><rect x="0" y="0" width="1200" height="256"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- blueprint grid -->
  <g stroke="#38bdf8" stroke-opacity="0.10" stroke-width="1">
    <line x1="0" y1="64"  x2="1200" y2="64"/>
    <line x1="0" y1="128" x2="1200" y2="128"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="80"   y1="0" x2="80"   y2="320"/>
    <line x1="240"  y1="0" x2="240"  y2="320"/>
    <line x1="400"  y1="0" x2="400"  y2="320"/>
    <line x1="560"  y1="0" x2="560"  y2="320"/>
    <line x1="720"  y1="0" x2="720"  y2="320"/>
    <line x1="880"  y1="0" x2="880"  y2="320"/>
    <line x1="1040" y1="0" x2="1040" y2="320"/>
  </g>

  <!-- rising massing towers -->
  <g clip-path="url(#groundClip)">

    <!-- Tower E (short, left) -->
    <g transform="translate(175,256)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 250;0 0" keyTimes="0;1"
          calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.0s" dur="1.0s" fill="freeze"/>
        <polygon points="0,-110 40,-90 0,-70 -40,-90" fill="url(#topFace)"/>
        <polygon points="-40,-90 0,-70 0,0 -40,-70" fill="#0ea5e9"/>
        <polygon points="40,-90 0,-70 0,0 40,-70" fill="#075985"/>
      </g>
    </g>

    <!-- Tower A -->
    <g transform="translate(250,256)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 250;0 0" keyTimes="0;1"
          calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.15s" dur="1.0s" fill="freeze"/>
        <polygon points="0,-198 48,-174 0,-150 -48,-174" fill="url(#topFace)"/>
        <polygon points="-48,-174 0,-150 0,0 -48,-150" fill="#0ea5e9"/>
        <polygon points="48,-174 0,-150 0,0 48,-150" fill="#075985"/>
        <circle cx="20" cy="-60"  r="3.2" fill="#7dd3fc"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
        <circle cx="30" cy="-110" r="3.2" fill="#7dd3fc"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.9s" repeatCount="indefinite"/></circle>
        <circle cx="20" cy="-150" r="3.2" fill="#7dd3fc"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" begin="1.6s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- Tower B -->
    <g transform="translate(340,256)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 250;0 0" keyTimes="0;1"
          calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.3s" dur="1.0s" fill="freeze"/>
        <polygon points="0,-135 40,-115 0,-95 -40,-115" fill="url(#topFace)"/>
        <polygon points="-40,-115 0,-95 0,0 -40,-95" fill="#0ea5e9"/>
        <polygon points="40,-115 0,-95 0,0 40,-95" fill="#075985"/>
      </g>
    </g>

    <!-- Tower C (tallest, amber accent) -->
    <g transform="translate(428,256)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 250;0 0" keyTimes="0;1"
          calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.5s" dur="1.05s" fill="freeze"/>
        <polygon points="0,-237 52,-211 0,-185 -52,-211" fill="url(#topAmber)"/>
        <polygon points="-52,-211 0,-185 0,0 -52,-185" fill="#f59e0b"/>
        <polygon points="52,-211 0,-185 0,0 52,-185" fill="#b45309"/>
        <circle cx="24" cy="-70"  r="3.4" fill="#fde68a"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" begin="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="34" cy="-130" r="3.4" fill="#fde68a"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" begin="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="24" cy="-185" r="3.4" fill="#fde68a"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" begin="2.0s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- Tower D -->
    <g transform="translate(520,256)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 250;0 0" keyTimes="0;1"
          calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.42s" dur="1.0s" fill="freeze"/>
        <polygon points="0,-164 44,-142 0,-120 -44,-142" fill="url(#topFace)"/>
        <polygon points="-44,-142 0,-120 0,0 -44,-120" fill="#0ea5e9"/>
        <polygon points="44,-142 0,-120 0,0 44,-120" fill="#075985"/>
      </g>
    </g>

    <!-- Tower F (short, right edge of cluster) -->
    <g transform="translate(595,256)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0 250;0 0" keyTimes="0;1"
          calcMode="spline" keySplines="0.16 0.84 0.24 1" begin="0.6s" dur="1.0s" fill="freeze"/>
        <polygon points="0,-92 34,-75 0,-58 -34,-75" fill="url(#topFace)"/>
        <polygon points="-34,-75 0,-58 0,0 -34,-58" fill="#0ea5e9"/>
        <polygon points="34,-75 0,-58 0,0 34,-58" fill="#075985"/>
      </g>
    </g>
  </g>

  <!-- ground datum line draws in -->
  <line x1="90" y1="256" x2="660" y2="256" stroke="#38bdf8" stroke-opacity="0.55" stroke-width="1.5"
        stroke-dasharray="570" stroke-dashoffset="570">
    <animate attributeName="stroke-dashoffset" from="570" to="0" begin="0.1s" dur="1.1s" fill="freeze"/>
  </line>

  <!-- wordmark + positioning -->
  <g transform="translate(648,0)">
    <text x="0" y="132" fill="#eaf3ff" font-size="62" font-weight="700" letter-spacing="1" opacity="0">
      Matthew Emma
      <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.7s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="18 0;0 0" keyTimes="0;1"
        calcMode="spline" keySplines="0.2 0.8 0.2 1" begin="0.7s" dur="0.7s" fill="freeze"/>
    </text>

    <text x="2" y="172" fill="#7dd3fc" font-size="23" font-weight="600" opacity="0">
      Construction operator who ships the software.
      <animate attributeName="opacity" from="0" to="1" begin="1.05s" dur="0.7s" fill="freeze"/>
    </text>

    <line x1="2" y1="192" x2="60" y2="192" stroke="#f59e0b" stroke-width="3" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/>
      <animate attributeName="x2" from="2" to="60" begin="1.2s" dur="0.5s" fill="freeze"/>
    </line>

    <text x="2" y="222" fill="#9fb3c8" font-size="17" letter-spacing="0.3" opacity="0">
      massing.build   ·   github.com/ibuilder   ·   linkedin.com/in/memma   ·   mattemma.blog
      <animate attributeName="opacity" from="0" to="1" begin="1.45s" dur="0.7s" fill="freeze"/>
    </text>
  </g>
</svg>
